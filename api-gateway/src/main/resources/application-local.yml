spring:
  data:
    redis:
      host: localhost
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        - id: menu-service
          uri: http://localhost:8082
          predicates:
            - Path=/menus/**, /categories/**

        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/orders/**, /cart/**, /coupons/**

        - id: review-service
          uri: http://localhost:8084
          predicates:
            - Path=/reviews/**

        - id: ai-service
          uri: http://localhost:8085
          predicates:
            - Path=/ai/**
